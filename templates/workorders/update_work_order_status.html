{% extends 'base.html' %}

{% block content %}

<div class="page-card">

    <h2>🔄 Update Work Order Status</h2>

    <table class="detail-table">

        <tr>
            <td class="detail-label">Work Order Number</td>
            <td>{{ work_order.work_order_number }}</td>
        </tr>

        <tr>
            <td class="detail-label">Title</td>
            <td>{{ work_order.title }}</td>
        </tr>

        <tr>
            <td class="detail-label">Current Status</td>
            <td>{{ work_order.status }}</td>
        </tr>

    </table>

    <form method="post">

        {% csrf_token %}

        <div class="form-group">

            <label>New Status</label>

            <select name="status">

                <option value="OPEN">OPEN</option>

                <option value="IN_PROGRESS">
                    IN PROGRESS
                </option>

                <option value="COMPLETED">
                    COMPLETED
                </option>

            </select>

        </div>

        <button type="submit" class="btn">
            Update Status
        </button>

        <a href="{% url 'my_work_orders' %}"
           class="btn"
           style="margin-left:10px;">
            Cancel
        </a>

    </form>

</div>

{% endblock %}
