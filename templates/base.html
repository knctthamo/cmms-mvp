<!DOCTYPE html>
<html>
<head>
    <title>CMMS</title>

    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
        }

        .layout {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 250px;
            background-color: #2c3e50;
            color: white;
            padding-top: 20px;
        }

        .sidebar h2 {
            text-align: center;
            margin-bottom: 30px;
        }

        .sidebar a {
            display: block;
            color: white;
            text-decoration: none;
            padding: 15px 20px;
        }

        .sidebar a:hover {
            background-color: #34495e;
        }

        .content {
            flex: 1;
            padding: 20px;
        }

        .topbar {
            background: linear-gradient(
                90deg,
                #2c3e50,
                #34495e
            );

            color: white;

            padding: 20px;

            margin-bottom: 20px;

            border-radius: 8px;

            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        .topbar h2 {
            margin: 0;
        }

        .welcome {
            float: right;
            font-weight: bold;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background-color: white;
        }

        th {
            background-color: #34495e;
            color: white;
            padding: 12px;
            text-align: left;
        }

        td {
            padding: 10px;
            border-bottom: 1px solid #ddd;
        }

        tr:hover {
            background-color: #f5f5f5;
        }

        button {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 8px 15px;
            cursor: pointer;
            border-radius: 4px;
        }

        button:hover {
            background-color: #2980b9;
        }

        .card {
            display: inline-block;
            width: 220px;
            margin: 10px;
            padding: 20px;
            background-color: white;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .card h3 {
            margin-bottom: 10px;
        }
        
        .page-card {
            background-color: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            max-width: 900px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        input[type=text],
        textarea,
        select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }

        .detail-table {
            width: 100%;
            border-collapse: collapse;
        }

        .detail-table td {
            padding: 12px;
        }

        .detail-label {
            font-weight: bold;
            width: 200px;
        }

        .danger-btn {
            background-color: #e74c3c;
        }

        .danger-btn:hover {
            background-color: #c0392b;
        }

        .action-links a {
            margin-right: 15px;
        }

    </style>

</head>

<body>

<div class="layout">

    <div class="sidebar">

        <h2>CMMS</h2>

        <a href="/dashboard/">
            Dashboard
        </a>

        <a href="/assets/">
            Assets
        </a>

        <a href="/workorders/">
            Work Orders
        </a>

        <a href="/logout/">
            Logout
        </a>

    </div>

    <div class="content">

        <div class="topbar">

            <h2>
                Computerized Maintenance Management System
            </h2>

            <span class="welcome">

                Welcome
                {{ request.user.username }}

            </span>

        </div>

        {% block content %}
        {% endblock %}

    </div>

</div>

</body>
</html>
