{% extends 'base.html' %}

{% block content %}

<div class="page-card">

    <h2>➕ Create User</h2>

    <form method="post">

        {% csrf_token %}

        <div class="form-group">

            <label>Username</label>

            <input
                type="text"
                name="username"
                required>

        </div>

        <div class="form-group">

            <label>Password</label>

            <input
                type="password"
                name="password"
                required>

        </div>

        <div class="form-group">

            <label>Phone Number</label>

            <input
                type="text"
                name="phone_number"
                placeholder=""
                required>

        </div>        

        <div class="form-group">

            <label>Role</label>

            <select name="role">

                {% for group in groups %}

                <option value="{{ group.name }}">

                    {{ group.name }}

                </option>

                {% endfor %}

            </select>

        </div>

        <button type="submit"
                class="btn">

            Create User

        </button>

        <a href="{% url 'user_list' %}"
           class="btn"
           style="margin-left:10px;">

            Cancel

        </a>

    </form>

</div>

{% endblock %}
