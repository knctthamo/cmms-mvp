<!DOCTYPE html>
<html>
<head>

    <title>CMMS Login</title>

    <style>

        body {
            margin: 0;
            font-family: Arial, sans-serif;

            background: linear-gradient(
                135deg,
                #1e3c72,
                #2a5298
            );

            height: 100vh;

            display: flex;

            justify-content: center;

            align-items: center;
        }

        .login-card {

            background-color: white;

            width: 400px;

            padding: 40px;

            border-radius: 10px;

            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .login-card h1 {

            text-align: center;

            margin-bottom: 30px;

            color: #2c3e50;
        }

        input {

            width: 100%;

            padding: 12px;

            margin-top: 5px;

            margin-bottom: 20px;

            border: 1px solid #ddd;

            border-radius: 4px;

            box-sizing: border-box;
        }

        button {

            width: 100%;

            padding: 12px;

            background-color: #2a5298;

            color: white;

            border: none;

            border-radius: 4px;

            cursor: pointer;
        }

        button:hover {

            background-color: #1e3c72;
        }

        .subtitle {

            text-align: center;

            color: #666;

            margin-bottom: 25px;
        }

    </style>

</head>

<body>

<div class="login-card">

    <h1>CMMS</h1>

    <div class="subtitle">

        Computerized Maintenance
        Management System

    </div>

    <form method="post">

        {% csrf_token %}

        <label>

            Username

        </label>

        <input
            type="text"
            name="username">

        <label>

            Password

        </label>

        <input
            type="password"
            name="password">

        <button type="submit">

            Login

        </button>

    </form>

</div>

</body>
</html>
