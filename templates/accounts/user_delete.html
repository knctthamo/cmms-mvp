{% extends 'base.html' %}

{% block content %}

<div class="page-card">

    <h2>🗑 Delete User</h2>

    <p>

        Are you sure you want to delete:

        <strong>
            {{ user_obj.username }}
        </strong>

        ?

    </p>

    <form method="post">

        {% csrf_token %}

        <button
            type="submit"
            class="btn danger-btn">

            Delete

        </button>

        <a href="{% url 'user_list' %}"
           class="btn"
           style="margin-left:10px;">

            Cancel

        </a>

    </form>

</div>

{% endblock %}
