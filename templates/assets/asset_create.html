{% extends 'base.html' %}

{% block content %}

<div class="page-card">

    <h1>Create Asset</h1>

    <form method="post">

        {% csrf_token %}

        <div class="form-group">

            <label>Asset Code</label>

            <input
                type="text"
                name="asset_code"
                required>

        </div>

        <div class="form-group">

            <label>Name</label>

            <input
                type="text"
                name="name"
                required>

        </div>

        <div class="form-group">

            <label>Status</label>

            <select name="status">

                <option value="ACTIVE">

                    ACTIVE

                </option>

                <option value="INACTIVE">

                    INACTIVE

                </option>

            </select>

        </div>

        <div class="form-group">

            <label>Criticality</label>

            <select name="criticality">

                <option value="LOW">

                    LOW

                </option>

                <option value="MEDIUM">

                    MEDIUM

                </option>

                <option value="HIGH">

                    HIGH

                </option>

            </select>

        </div>

        <div class="form-group">

            <label>Installation Date</label>

            <input
                type="date"
                name="installation_date">

        </div>

        <button type="submit">

            Create Asset

        </button>

        <a href="/assets/">

            Cancel

        </a>

    </form>

</div>

{% endblock %}
