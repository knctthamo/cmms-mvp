{% extends 'base.html' %}

{% block content %}

<div class="page-card">

<h1>Asset Details</h1>

<table class="detail-table">

<tr>
    <td class="detail-label">Asset Code</td>
    <td>{{ asset.asset_code }}</td>
</tr>

<tr>
    <td class="detail-label">Name</td>
    <td>{{ asset.name }}</td>
</tr>

<tr>
    <td class="detail-label">Status</td>
    <td>{{ asset.status }}</td>
</tr>

<tr>
    <td class="detail-label">Criticality</td>
    <td>{{ asset.criticality }}</td>
</tr>

</table>

<br>

<div class="action-links">

<a href="/assets/{{ asset.id }}/edit/">Edit</a>

<a href="/assets/{{ asset.id }}/delete/">Delete</a>

<a href="/assets/">Back</a>

</div>

</div>

{% endblock %}
