{% extends 'base.html' %}

{% block content %}

<div class="page-card">

    <h1>Edit Asset</h1>

    <form method="post">

        {% csrf_token %}

        <div class="form-group">

            <label>Asset Code</label>

            <input
                type="text"
                name="asset_code"
                value="{{ asset.asset_code }}">

        </div>

        <div class="form-group">

            <label>Name</label>

            <input
                type="text"
                name="name"
                value="{{ asset.name }}">

        </div>
        
        <div class="form-group">

            <label>Installation Date</label>

            <input
                type="date"
                name="installation_date"
                value="{{ asset.installation_date|date:'Y-m-d' }}">

        </div>

        <div class="form-group">

            <label>Status</label>

            <select name="status">

                <option
                    value="ACTIVE"
                    {% if asset.status == 'ACTIVE' %}
                    selected
                    {% endif %}
                >
                    ACTIVE
                </option>

                <option
                    value="INACTIVE"
                    {% if asset.status == 'INACTIVE' %}
                    selected
                    {% endif %}
                >
                    INACTIVE
                </option>

            </select>

        </div>

        <div class="form-group">

            <label>Criticality</label>

            <select name="criticality">

                <option
                    value="LOW"
                    {% if asset.criticality == 'LOW' %}
                    selected
                    {% endif %}
                >
                    LOW
                </option>

                <option
                    value="MEDIUM"
                    {% if asset.criticality == 'MEDIUM' %}
                    selected
                    {% endif %}
                >
                    MEDIUM
                </option>

                <option
                    value="HIGH"
                    {% if asset.criticality == 'HIGH' %}
                    selected
                    {% endif %}
                >
                    HIGH
                </option>

            </select>

        </div>

        <button type="submit">

            Update Asset

        </button>

        <a href="/assets/{{ asset.id }}/">

            Cancel

        </a>

    </form>

</div>

{% endblock %}
