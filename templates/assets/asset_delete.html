<!DOCTYPE html>
<html>
<head>
    <title>Delete Asset</title>
</head>
<body>

<h1>Delete Asset</h1>

<p>
    Are you sure you want to delete:
</p>

<p>
    {{ asset.asset_code }} - {{ asset.name }}
</p>

<form method="post">

    {% csrf_token %}

    <button type="submit">
        Delete
    </button>

</form>

<p>
    <a href="/assets/{{ asset.id }}/">
        Cancel
    </a>
</p>

</body>
</html>
