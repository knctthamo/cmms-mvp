{% extends 'base.html' %}

{% block content %}

<div class="page-card">

<h1>Delete Asset</h1>

<p>

Are you sure you want to delete:

<strong>

{{ asset.asset_code }} - {{ asset.name }}

</strong>

?

</p>

<form method="post">

{% csrf_token %}

<button
    type="submit"
    class="danger-btn">

    Delete Asset

</button>

</form>

<br>

<a href="/assets/{{ asset.id }}/">

Cancel

</a>

</div>

{% endblock %}
